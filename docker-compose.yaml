services:
  db:
    image: mariadb:11.4
    container_name: phpsk-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: phpsk
      MARIADB_USER: phpsk
      MARIADB_PASSWORD: phpsk_dev_password
      MARIADB_ROOT_PASSWORD: phpsk_root_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro,z
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-pphpsk_root_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: phpsk-php
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_NAME: PHP SPA Boilerplate
      DB_DRIVER: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: phpsk
      DB_USER: phpsk
      DB_PASS: phpsk_dev_password
      VITE_DEV_SERVER: http://localhost:5173
    volumes:
      - ./:/var/www/html:z
    depends_on:
      db:
        condition: service_healthy

  php_test:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: phpsk-php-test
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_ENV: testing
      APP_DEBUG: "true"
      APP_URL: http://localhost:8081
      APP_NAME: PHP SPA Boilerplate
      DB_DRIVER: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: phpsk_test
      DB_USER: phpsk
      DB_PASS: phpsk_dev_password
      VITE_DEV_SERVER: ""
    volumes:
      - ./:/var/www/html:z
    depends_on:
      db:
        condition: service_healthy

  node:
    image: node:20-alpine
    container_name: phpsk-node
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_PROXY_TARGET: http://nginx
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html:z
    depends_on:
      - nginx

  nginx:
    image: nginx:1.27-alpine
    container_name: phpsk-nginx
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro,z
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro,z

  nginx_test:
    image: nginx:1.27-alpine
    container_name: phpsk-nginx-test
    restart: unless-stopped
    depends_on:
      - php_test
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html:ro,z
      - ./docker/nginx/default.test.conf:/etc/nginx/conf.d/default.conf:ro,z

volumes:
  mariadb_data:
